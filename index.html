<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bird WorkTime PRO</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon2.png">
<meta name="theme-color" content="#0f172a">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: #e2e8f0;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px 10px;
}

.header img {
  width: 80px;
  border-radius: 20px;
  box-shadow: 0 0 25px #38bdf8;
}

.header h1 {
  margin-top: 10px;
  font-size: 20px;
  color: #38bdf8;
}

/* CARD */
.card {
  background: rgba(30,41,59,0.6);
  backdrop-filter: blur(10px);
  margin: 12px;
  padding: 15px;
  border-radius: 18px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}

/* INPUT */
label {
  font-size: 13px;
  color: #94a3b8;
}

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 12px;
  border-radius: 12px;
  border: none;
  background: #0f172a;
  color: white;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  margin-top: 6px;
}

.primary {
  background: linear-gradient(90deg,#38bdf8,#0ea5e9);
  color: white;
}

.success {
  background: linear-gradient(90deg,#22c55e,#16a34a);
  color: white;
}

/* TOTAL */
.total {
  text-align: center;
  font-size: 18px;
  margin-bottom: 10px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #1e293b;
}

th, td {
  padding: 8px;
  font-size: 13px;
  text-align: center;
}

/* BADGE */
.badge {
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 12px;
}

.ot { background: #ef4444; }
.normal { background: #22c55e; }

/* ACTION */
.action-btn {
  padding: 5px 8px;
  border-radius: 8px;
  border: none;
  margin: 2px;
}
.edit { background: #facc15; }
.delete { background: #ef4444; }

</style>
</head>

<body>

<div class="header">
  <img src="icon.png">
  <h1>Bird WorkTime PRO</h1>
</div>

<div class="card">
  <label>📅 วันที่</label>
  <input type="date" id="date">

  <label>⏰ เข้า</label>
  <input type="time" id="in">

  <label>⏰ ออก</label>
  <input type="time" id="out">

  <label>📝 เหตุผล OT</label>
  <input type="text" id="note">

  <button class="btn primary" onclick="save()">💾 บันทึก</button>
  <button class="btn success" onclick="exportExcel()">📥 Export</button>
</div>

<div class="card">
  <div class="total">📊 OT รวม: <span id="totalOT">0</span> ชม.</div>

  <table>
    <thead>
      <tr>
        <th>วัน</th>
        <th>เข้า</th>
        <th>ออก</th>
        <th>ชม.</th>
        <th>OT</th>
        <th>เหตุผล</th>
        <th>⚙️</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

<script>
let list = JSON.parse(localStorage.getItem("work")) || [];

function calc(inTime, outTime){
  let start = new Date("2000-01-01 " + inTime);
  let end = new Date("2000-01-01 " + outTime);
  let hrs = (end - start)/1000/60/60;
  let ot = hrs > 9 ? hrs - 9 : 0;
  return {hrs: hrs.toFixed(2), ot: ot.toFixed(2)};
}

function render(){
  let html = "";
  let totalOT = 0;

  list.forEach((d,i)=>{
    let c = calc(d.in, d.out);
    totalOT += parseFloat(c.ot);

    html += `
    <tr>
      <td>${d.date}</td>
      <td>${d.in}</td>
      <td>${d.out}</td>
      <td><span class="badge normal">${c.hrs}</span></td>
      <td><span class="badge ${c.ot>0?'ot':'normal'}">${c.ot}</span></td>
      <td>${d.note || "-"}</td>
      <td>
        <button class="action-btn edit" onclick="edit(${i})">✏️</button>
        <button class="action-btn delete" onclick="del(${i})">🗑️</button>
      </td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
  document.getElementById("totalOT").innerText = totalOT.toFixed(2);
  localStorage.setItem("work", JSON.stringify(list));
}

function save(){
  let date = document.getElementById("date").value;
  let inputIn = document.getElementById("in").value;
  let out = document.getElementById("out").value;
  let note = document.getElementById("note").value;

  if(!date || !inputIn || !out){
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  list.push({date, in:inputIn, out, note});
  render();
}

function del(i){
  list.splice(i,1);
  render();
}

function edit(i){
  let d = list[i];
  document.getElementById("date").value = d.date;
  document.getElementById("in").value = d.in;
  document.getElementById("out").value = d.out;
  document.getElementById("note").value = d.note;
  del(i);
}

function exportExcel(){
  let csv = "Date,In,Out,Hours,OT,Note\n";

  list.forEach(d=>{
    let c = calc(d.in, d.out);
    csv += `${d.date},${d.in},${d.out},${c.hrs},${c.ot},${d.note}\n`;
  });

  let blob = new Blob([csv], {type: "text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "worktime.csv";
  a.click();
}

render();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
