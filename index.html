<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bird WorkTime PRO</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: sans-serif;
  background: linear-gradient(180deg,#0f172a,#020617);
  color: white;
  padding: 15px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
  color: #38bdf8;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}

label {
  color: #94a3b8;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 12px;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  margin-top: 5px;
}

.save { background: #38bdf8; }
.export { background: #22c55e; }

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #334155;
}

th, td {
  padding: 8px;
  text-align: center;
}

.total {
  text-align: center;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🕒 Bird WorkTime PRO</h1>

<div class="card">
  <label>📅 วันที่</label>
  <input type="date" id="date">

  <label>⏰ เวลาเข้างาน</label>
  <input type="time" id="in">

  <label>⏰ เวลาออกงาน</label>
  <input type="time" id="out">

  <label>📝 เหตุผล OT</label>
  <input type="text" id="note" placeholder="เช่น วิ่งงานช่วงเย็น / ส่งออก / รับเข้า">

  <button class="save" onclick="save()">💾 บันทึก</button>
  <button class="export" onclick="exportExcel()">📥 Export Excel</button>
</div>

<div class="card">
  <div class="total">📊 รวม OT: <span id="totalOT">0</span> ชั่วโมง</div>

  <table border="1">
    <thead>
      <tr>
        <th>วันที่</th>
        <th>เข้า</th>
        <th>ออก</th>
        <th>ชม.</th>
        <th>OT</th>
        <th>เหตุผล</th>
        <th>จัดการ</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

</div>

<script>
let list = JSON.parse(localStorage.getItem("work")) || [];

function calc(inTime, outTime){
  let start = new Date("2000-01-01 " + inTime);
  let end = new Date("2000-01-01 " + outTime);
  let hrs = (end - start)/1000/60/60;
  let ot = hrs > 9 ? hrs - 9 : 0;
  return {hrs: hrs.toFixed(2), ot: ot.toFixed(2)};
}

function render(){
  let html = "";
  let totalOT = 0;

  list.forEach((d,i)=>{
    let c = calc(d.in, d.out);
    totalOT += parseFloat(c.ot);

    html += `
    <tr>
      <td>${d.date}</td>
      <td>${d.in}</td>
      <td>${d.out}</td>
      <td>${c.hrs}</td>
      <td>${c.ot}</td>
      <td>${d.note || "-"}</td>
      <td>
        <button onclick="edit(${i})">✏️</button>
        <button onclick="del(${i})">🗑️</button>
      </td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
  document.getElementById("totalOT").innerText = totalOT.toFixed(2);

  localStorage.setItem("work", JSON.stringify(list));
}

function save(){
  let date = document.getElementById("date").value;
  let inputIn = document.getElementById("in").value;
  let out = document.getElementById("out").value;
  let note = document.getElementById("note").value;

  if(!date || !inputIn || !out){
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  list.push({date, in:inputIn, out, note});
  render();
}

function del(i){
  list.splice(i,1);
  render();
}

function edit(i){
  let d = list[i];
  document.getElementById("date").value = d.date;
  document.getElementById("in").value = d.in;
  document.getElementById("out").value = d.out;
  document.getElementById("note").value = d.note;
  del(i);
}

function exportExcel(){
  let csv = "Date,In,Out,Hours,OT,Note\n";

  list.forEach(d=>{
    let c = calc(d.in, d.out);
    csv += `${d.date},${d.in},${d.out},${c.hrs},${c.ot},${d.note}\n`;
  });

  let blob = new Blob([csv], {type: "text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "worktime.csv";
  a.click();
}

render();
</script>

</body>
</html>
