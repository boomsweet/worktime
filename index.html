<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Bird WorkTime</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #fff;
      padding: 15px;
    }
    h1 {
      text-align: center;
      color: #38bdf8;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }
    input {
      background: #1e293b;
      color: white;
    }
    button {
      background: #38bdf8;
      color: black;
      font-weight: bold;
    }
    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
    }
    th, td {
      padding: 8px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }
    th {
      color: #38bdf8;
    }
  </style>
</head>

<body>

<h1>🕒 Bird WorkTime</h1>

<label>📅 วันที่</label>
<input type="date" id="date">

<label>⏰ เวลาเข้า</label>
<input type="time" id="in">

<label>⏰ เวลาออก</label>
<input type="time" id="out">

<button onclick="saveData()">💾 บันทึก</button>

<table>
  <thead>
    <tr>
      <th>วันที่</th>
      <th>เข้า</th>
      <th>ออก</th>
      <th>ชั่วโมง</th>
    </tr>
  </thead>
  <tbody id="dataTable"></tbody>
</table>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtJpmBYs7uKExt5-LF4bDAKoJhcWC2wZk",
  authDomain: "bird-worktime.firebaseapp.com",
  projectId: "bird-worktime",
  storageBucket: "bird-worktime.firebasestorage.app",
  messagingSenderId: "1006621097399",
  appId: "1:1006621097399:web:d7272dcd29bae5c2d27c32",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function saveData() {
  const date = document.getElementById("date").value;
  const timeIn = document.getElementById("in").value;
  const timeOut = document.getElementById("out").value;

  if (!date || !timeIn || !timeOut) {
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  const hours = calculateHours(timeIn, timeOut);

  await addDoc(collection(db, "worktime"), {
    date,
    timeIn,
    timeOut,
    hours
  });

  alert("บันทึกสำเร็จ");
  loadData();
}

function calculateHours(start, end) {
  const s = new Date(`2000-01-01 ${start}`);
  const e = new Date(`2000-01-01 ${end}`);
  return ((e - s) / 1000 / 60 / 60).toFixed(2);
}

async function loadData() {
  const table = document.getElementById("dataTable");
  table.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "worktime"));

  querySnapshot.forEach((doc) => {
    const d = doc.data();

    table.innerHTML += `
      <tr>
        <td>${d.date}</td>
        <td>${d.timeIn}</td>
        <td>${d.timeOut}</td>
        <td>${d.hours}</td>
      </tr>
    `;
  });
}

loadData();

window.saveData = saveData;
</script>

</body>
</html>
