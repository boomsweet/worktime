<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bird WorkTime PRO</title>

<style>
body {
  font-family: sans-serif;
  background: #0f172a;
  color: white;
  padding: 15px;
}
h1 {
  text-align: center;
  color: #38bdf8;
}
input, button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
}
button {
  background: #38bdf8;
  font-weight: bold;
}
table {
  width: 100%;
  margin-top: 10px;
}
th, td {
  padding: 8px;
  text-align: center;
}
</style>
</head>

<body>

<h1>🕒 Bird WorkTime PRO</h1>

<input type="date" id="date">
<input type="time" id="in">
<input type="time" id="out">

<button onclick="save()">💾 บันทึก</button>
<button onclick="exportExcel()">📥 Export Excel</button>

<h3>รวม OT: <span id="totalOT">0</span> ชม.</h3>

<table border="1">
<thead>
<tr>
<th>วันที่</th>
<th>เข้า</th>
<th>ออก</th>
<th>ชั่วโมง</th>
<th>OT</th>
<th>จัดการ</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>
let list = JSON.parse(localStorage.getItem("work")) || [];

function calc(inTime, outTime){
  let start = new Date("2000-01-01 " + inTime);
  let end = new Date("2000-01-01 " + outTime);
  let hrs = (end - start)/1000/60/60;
  let ot = hrs > 9 ? hrs - 9 : 0;
  return {hrs: hrs.toFixed(2), ot: ot.toFixed(2)};
}

function render(){
  let html = "";
  let totalOT = 0;

  list.forEach((d,i)=>{
    let c = calc(d.in, d.out);
    totalOT += parseFloat(c.ot);

    html += `
    <tr>
      <td>${d.date}</td>
      <td>${d.in}</td>
      <td>${d.out}</td>
      <td>${c.hrs}</td>
      <td>${c.ot}</td>
      <td>
        <button onclick="edit(${i})">✏️</button>
        <button onclick="del(${i})">🗑️</button>
      </td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
  document.getElementById("totalOT").innerText = totalOT.toFixed(2);

  localStorage.setItem("work", JSON.stringify(list));
}

function save(){
  let date = document.getElementById("date").value;
  let inputIn = document.getElementById("in").value;
  let out = document.getElementById("out").value;

  if(!date || !inputIn || !out){
    alert("กรอกให้ครบ");
    return;
  }

  list.push({date, in:inputIn, out});
  render();
}

function del(i){
  list.splice(i,1);
  render();
}

function edit(i){
  let d = list[i];
  document.getElementById("date").value = d.date;
  document.getElementById("in").value = d.in;
  document.getElementById("out").value = d.out;
  del(i);
}

function exportExcel(){
  let csv = "Date,In,Out,Hours,OT\n";

  list.forEach(d=>{
    let c = calc(d.in, d.out);
    csv += `${d.date},${d.in},${d.out},${c.hrs},${c.ot}\n`;
  });

  let blob = new Blob([csv], {type: "text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "worktime.csv";
  a.click();
}

render();
</script>

</body>
</html>
