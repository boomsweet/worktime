<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bird WorkTime PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<style>
* { box-sizing: border-box; }

/* 🌈 พื้นหลังใหม่ */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
  animation: fadeIn 0.5s ease;
}

/* HEADER */
.header { text-align: center; padding: 20px 10px; }
.header img {
  width: 80px;
  border-radius: 20px;
  box-shadow: 0 0 30px #38bdf8;
}
.header h1 {
  margin-top: 10px;
  font-size: 22px;
  background: linear-gradient(45deg, #38bdf8, #22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 💎 CARD */
.card {
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(12px);
  margin: 12px;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-3px);
}

/* INPUT */
label { font-size: 13px; color: #94a3b8; }

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 12px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.05);
  background: rgba(15,23,42,0.8);
  color: white;
  transition: 0.2s;
}
input:focus {
  outline: none;
  border-color: #38bdf8;
  box-shadow: 0 0 10px #38bdf8;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  margin-top: 6px;
  transition: 0.2s;
}
.btn:active {
  transform: scale(0.95);
}
.primary { background: #38bdf8; }
.success { background: #22c55e; }

/* TOTAL */
.total {
  text-align: center;
  font-size: 18px;
  margin-bottom: 10px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  overflow: hidden;
  border-radius: 12px;
}
th { background: #1e293b; }
th, td {
  padding: 8px;
  font-size: 13px;
  text-align: center;
}
tr:hover {
  background: rgba(255,255,255,0.05);
}

/* BADGE */
.badge {
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 12px;
}
.ot {
  background: linear-gradient(45deg, #ef4444, #dc2626);
  box-shadow: 0 0 10px rgba(239,68,68,0.7);
}
.normal { background: #22c55e; }

/* ACTION */
.action-btn {
  padding: 5px 8px;
  border-radius: 8px;
  border: none;
  margin: 2px;
}
.edit { background: #facc15; }
.delete { background: #ef4444; }

.empty {
  text-align:center;
  margin-top:10px;
  color:#94a3b8;
}

/* ✨ Animation */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<div class="header">
  <img src="icon2.png">
  <h1>Bird WorkTime PRO</h1>
</div>

<div class="card">
  <label>📅 วันที่</label>
  <input type="date" id="date">

  <label>⏰ เข้า</label>
  <input type="time" id="in">

  <label>⏰ ออก</label>
  <input type="time" id="out">

  <label>📝 เหตุผล OT</label>
  <input type="text" id="note">

  <button class="btn primary" onclick="save()">💾 บันทึก</button>
  <button class="btn success" onclick="exportExcel()">📥 Export</button>
</div>

<div class="card">
  <div class="total">📊 OT รวม: <span id="totalOT">0</span> ชม.</div>

  <table>
    <thead>
      <tr>
        <th>วัน</th>
        <th>เข้า</th>
        <th>ออก</th>
        <th>ชม.</th>
        <th>OT</th>
        <th>เหตุผล</th>
        <th>⚙️</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

  <p id="empty" class="empty"></p>
</div>

<script>
let list = JSON.parse(localStorage.getItem("work")) || [];

function calc(inTime, outTime){
  let start = new Date("2000-01-01 " + inTime);
  let end = new Date("2000-01-01 " + outTime);
  let hrs = (end - start)/1000/60/60;
  let ot = hrs > 9 ? hrs - 9 : 0;
  return {hrs: hrs.toFixed(2), ot: ot.toFixed(2)};
}

function render(){
  let html = "";
  let totalOT = 0;

  document.getElementById("empty").innerText =
    list.length === 0 ? "ยังไม่มีข้อมูล 😅" : "";

  let sorted = [...list].sort((a,b)=> new Date(b.date) - new Date(a.date));

  sorted.forEach((d,i)=>{
    let c = calc(d.in, d.out);
    totalOT += parseFloat(c.ot);

    let dateTH = new Date(d.date).toLocaleDateString("th-TH", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    });

    html += `
    <tr>
      <td>${dateTH}</td>
      <td>${d.in}</td>
      <td>${d.out}</td>
      <td><span class="badge normal">${c.hrs}</span></td>
      <td><span class="badge ${c.ot>0?'ot':'normal'}">${c.ot}</span></td>
      <td>${d.note || "-"}</td>
      <td>
        <button class="action-btn edit" onclick="edit(${i})">✏️</button>
        <button class="action-btn delete" onclick="del(${i})">🗑️</button>
      </td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
  document.getElementById("totalOT").innerText = totalOT.toFixed(2);
  localStorage.setItem("work", JSON.stringify(list));
}

function save(){
  let date = document.getElementById("date").value;
  let inputIn = document.getElementById("in").value;
  let out = document.getElementById("out").value;
  let note = document.getElementById("note").value;

  if(!date || !inputIn || !out){
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  list.push({date, in:inputIn, out, note});

  document.getElementById("date").value = "";
  document.getElementById("in").value = "";
  document.getElementById("out").value = "";
  document.getElementById("note").value = "";

  render();
}

function del(i){
  list.splice(i,1);
  render();
}

function edit(i){
  let d = list[i];
  document.getElementById("date").value = d.date;
  document.getElementById("in").value = d.in;
  document.getElementById("out").value = d.out;
  document.getElementById("note").value = d.note;
  del(i);
}

function exportExcel(){
  let csv = "Date,In,Out,Hours,OT,Note\n";
  list.forEach(d=>{
    let c = calc(d.in, d.out);
    csv += `${d.date},${d.in},${d.out},${c.hrs},${c.ot},${d.note}\n`;
  });

  let blob = new Blob([csv]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "worktime.csv";
  a.click();
}

render();

/* ติดตั้งแอป */
let deferredPrompt;
window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredPrompt = e;

  setTimeout(()=>{
    if(deferredPrompt){
      deferredPrompt.prompt();
    }
  },1500);
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
