<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bird WorkTime PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: #e2e8f0;
}
.header { text-align: center; padding: 20px 10px; }
.header img {
  width: 80px;
  border-radius: 20px;
  box-shadow: 0 0 25px #38bdf8;
}
.header h1 { margin-top: 10px; font-size: 20px; color: #38bdf8; }

.card {
  background: rgba(30,41,59,0.6);
  backdrop-filter: blur(10px);
  margin: 12px;
  padding: 15px;
  border-radius: 18px;
}

label { font-size: 13px; color: #94a3b8; }

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 12px;
  border-radius: 12px;
  border: none;
  background: #0f172a;
  color: white;
}

.btn {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  margin-top: 6px;
}
.primary { background: #38bdf8; }
.success { background: #22c55e; }

.total {
  text-align: center;
  font-size: 18px;
  margin-bottom: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}
th { background: #1e293b; }
th, td {
  padding: 8px;
  font-size: 13px;
  text-align: center;
}

.badge {
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 12px;
}
.ot { background: #ef4444; }
.normal { background: #22c55e; }

.action-btn {
  padding: 5px 8px;
  border-radius: 8px;
  border: none;
  margin: 2px;
}
.edit { background: #facc15; }
.delete { background: #ef4444; }

.empty {
  text-align:center;
  margin-top:10px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="header">
  <img src="icon2.png">
  <h1>Bird WorkTime PRO</h1>
</div>

<div class="card">
  <label>📅 วันที่</label>
  <input type="date" id="date">

  <label>⏰ เข้า</label>
  <input type="time" id="in">

  <label>⏰ ออก</label>
  <input type="time" id="out">

  <label>📝 เหตุผล OT</label>
  <input type="text" id="note">

  <button class="btn primary" onclick="save()">💾 บันทึก</button>
  <button class="btn success" onclick="exportExcel()">📥 Export</button>
</div>

<div class="card">
  <div class="total">📊 OT รวม: <span id="totalOT">0</span> ชม.</div>

  <table>
    <thead>
      <tr>
        <th>วัน</th>
        <th>เข้า</th>
        <th>ออก</th>
        <th>ชม.</th>
        <th>OT</th>
        <th>OT เวลา</th> <!-- 🔥 เพิ่ม -->
        <th>เหตุผล</th>
        <th>⚙️</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

  <p id="empty" class="empty"></p>
</div>

<script>
let list = JSON.parse(localStorage.getItem("work")) || [];

function calc(inTime, outTime){
  let start = new Date("2000-01-01 " + inTime);
  let end = new Date("2000-01-01 " + outTime);
  let hrs = (end - start)/1000/60/60;
  let ot = hrs > 9 ? hrs - 9 : 0;

  let otStart = "-";
  let otEnd = "-";

  if(ot > 0){
    let otStartTime = new Date(start.getTime() + (9 * 60 * 60 * 1000));
    otStart = otStartTime.toTimeString().slice(0,5);
    otEnd = outTime;
  }

  return {
    hrs: hrs.toFixed(2),
    ot: ot.toFixed(2),
    otStart,
    otEnd
  };
}

function render(){
  let html = "";
  let totalOT = 0;

  document.getElementById("empty").innerText =
    list.length === 0 ? "ยังไม่มีข้อมูล 😅" : "";

  let sorted = [...list].sort((a,b)=> new Date(b.date) - new Date(a.date));

  sorted.forEach((d,i)=>{
    let c = calc(d.in, d.out);
    totalOT += parseFloat(c.ot);

    let dateTH = new Date(d.date).toLocaleDateString("th-TH", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    });

    html += `
    <tr>
      <td>${dateTH}</td>
      <td>${d.in}</td>
      <td>${d.out}</td>
      <td><span class="badge normal">${c.hrs}</span></td>
      <td><span class="badge ${c.ot>0?'ot':'normal'}">${c.ot}</span></td>
      <td>${c.ot > 0 ? c.otStart + " - " + c.otEnd : "-"}</td>
      <td>${d.note || "-"}</td>
      <td>
        <button class="action-btn edit" onclick="edit(${i})">✏️</button>
        <button class="action-btn delete" onclick="del(${i})">🗑️</button>
      </td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
  document.getElementById("totalOT").innerText = totalOT.toFixed(2);
  localStorage.setItem("work", JSON.stringify(list));
}

function save(){
  let date = document.getElementById("date").value;
  let inputIn = document.getElementById("in").value;
  let out = document.getElementById("out").value;
  let note = document.getElementById("note").value;

  if(!date || !inputIn || !out){
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  list.push({date, in:inputIn, out, note});

  document.getElementById("date").value = "";
  document.getElementById("in").value = "";
  document.getElementById("out").value = "";
  document.getElementById("note").value = "";

  render();
}

function del(i){
  list.splice(i,1);
  render();
}

function edit(i){
  let d = list[i];
  document.getElementById("date").value = d.date;
  document.getElementById("in").value = d.in;
  document.getElementById("out").value = d.out;
  document.getElementById("note").value = d.note;
  del(i);
}

function exportExcel(){
  let csv = "Date,In,Out,Hours,OT,OT Time,Note\n";
  list.forEach(d=>{
    let c = calc(d.in, d.out);
    let otTime = c.ot > 0 ? c.otStart + "-" + c.otEnd : "-";
    csv += `${d.date},${d.in},${d.out},${c.hrs},${c.ot},${otTime},${d.note}\n`;
  });

  let blob = new Blob([csv]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "worktime.csv";
  a.click();
}

render();

/* ติดตั้งแอป */
let deferredPrompt;
window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredPrompt = e;

  setTimeout(()=>{
    if(deferredPrompt){
      deferredPrompt.prompt();
    }
  },1500);
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
