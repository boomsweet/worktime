<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bird WorkTime PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:#e2e8f0;
}

.header {
  text-align:center;
  padding:20px;
}
.header img {
  width:80px;
  border-radius:20px;
}

.card {
  margin:12px;
  padding:15px;
  border-radius:18px;
  background:#1e293b;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:#020617;
  color:white;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:8px;
  font-weight:bold;
}

.primary { background:#38bdf8; }
.success { background:#22c55e; }

table {
  width:100%;
}
th,td {
  padding:6px;
  text-align:center;
}

.badge {
  padding:4px 8px;
  border-radius:8px;
}
.ot { background:#ef4444; }
.normal { background:#22c55e; }

.install-btn {
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  border-radius:12px;
  background:#22c55e;
  color:white;
  display:none;
}
</style>
</head>

<body>

<div class="header">
  <img src="icon2.png">
  <h2>Bird WorkTime PRO</h2>
</div>

<div class="card">
<input type="date" id="date">
<input type="time" id="in">
<input type="time" id="out">
<input type="text" id="note" placeholder="เหตุผล OT">

<button class="primary" onclick="save()">บันทึก</button>
<button class="success" onclick="exportExcel()">Export</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>วัน</th><th>OT</th><th>เหตุผล</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<button id="installBtn" class="install-btn">📲 ติดตั้งแอป</button>

<script>
let list = JSON.parse(localStorage.getItem("work")) || [];

function calc(i,o){
 let s=new Date("2000 "+i);
 let e=new Date("2000 "+o);
 let h=(e-s)/3600000;
 return {ot:h>9?(h-9):0};
}

function render(){
 let html="";
 let sorted=[...list].sort((a,b)=> new Date(b.date)-new Date(a.date));

 sorted.forEach(d=>{
  let c=calc(d.in,d.out);

  let dateTH=new Date(d.date).toLocaleDateString("th-TH");

  html+=`
  <tr>
   <td>${dateTH}</td>
   <td><span class="badge ${c.ot>0?'ot':'normal'}">${c.ot.toFixed(2)}</span></td>
   <td>${d.note||"-"}</td>
  </tr>`;
 });

 document.getElementById("data").innerHTML=html;
 localStorage.setItem("work",JSON.stringify(list));
}

function save(){
 if(!date.value||!in.value||!out.value){ alert("กรอกให้ครบ"); return; }

 list.push({
  date:date.value,
  in:in.value,
  out:out.value,
  note:note.value
 });

 date.value="";
 in.value="";
 out.value="";
 note.value="";

 render();
}

function exportExcel(){
 let csv="Date,OT,Note\n";
 list.forEach(d=>{
  let c=calc(d.in,d.out);
  csv+=`${d.date},${c.ot.toFixed(2)},${d.note}\n`;
 });

 let blob=new Blob([csv]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="worktime.csv";
 a.click();
}

render();

/* 🔥 ปุ่มติดตั้งแอป */
let deferredPrompt;
const btn=document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt",(e)=>{
 e.preventDefault();
 deferredPrompt=e;
 btn.style.display="block";
});

btn.addEventListener("click",()=>{
 deferredPrompt.prompt();
 deferredPrompt.userChoice.then(()=>{
  deferredPrompt=null;
  btn.style.display="none";
 });
});

/* service worker */
if("serviceWorker" in navigator){
 navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
