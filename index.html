<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WorkTime</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Prompt',sans-serif;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:white;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
}
.header img {
  width:70px;
  border-radius:20px;
}
.sub {
  font-size:12px;
  color:#94a3b8;
}

/* DASHBOARD */
.stats {
  display:flex;
  justify-content:space-around;
  margin:10px;
}
.box {
  flex:1;
  margin:5px;
  padding:12px;
  text-align:center;
  border-radius:15px;
  background:rgba(30,41,59,0.5);
  backdrop-filter:blur(10px);
}

/* CARD */
.card {
  margin:10px;
  padding:15px;
  border-radius:18px;
  background:rgba(30,41,59,0.5);
  backdrop-filter:blur(15px);
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  border:1px solid #1e293b;
  background:#020617;
  color:white;
}
input:focus {
  outline:none;
  border:1px solid #38bdf8;
  box-shadow:0 0 10px #38bdf8;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:8px;
  font-weight:bold;
}
button:active {
  transform:scale(0.96);
}

.primary { background:#38bdf8; }
.success { background:#22c55e; }

/* TABLE */
table {
  width:100%;
  font-size:13px;
}
th,td {
  padding:6px;
  text-align:center;
}

/* BADGE */
.badge {
  padding:4px 8px;
  border-radius:999px;
}
.ot {
  background:rgba(239,68,68,0.2);
  color:#ef4444;
}
.normal {
  background:rgba(34,197,94,0.2);
  color:#22c55e;
}

/* MONTH HEADER */
.month {
  text-align:left;
  padding:10px;
  font-weight:bold;
  color:#38bdf8;
}

/* EMPTY */
.empty {
  text-align:center;
  color:#94a3b8;
  margin-top:10px;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top:1px solid #1e293b;
}
</style>
</head>

<body>

<div class="header">
  <img src="icon.png">
  <h2>WorkTime</h2>
  <div class="sub">ระบบบันทึกเวลา & OT</div>
</div>

<!-- DASHBOARD -->
<div class="stats">
  <div class="box">🕒<br><span id="hrs">0</span></div>
  <div class="box">🔥<br><span id="ot">0</span></div>
  <div class="box">📅<br><span id="days">0</span></div>
</div>

<!-- INPUT -->
<div class="card">
<input type="date" id="date">
<input type="time" id="in">
<input type="time" id="out">
<input type="text" id="note" placeholder="เหตุผล OT">

<button class="primary" onclick="save()">บันทึก</button>
<button class="success" onclick="exportExcel()">Export</button>
</div>

<!-- TABLE -->
<div class="card">
<table>
<thead>
<tr>
<th>วัน</th><th>OT</th><th>เหตุผล</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<p id="empty" class="empty"></p>
</div>

<div class="nav">
🏠 📊 ⚙️
</div>

<script>
let list = JSON.parse(localStorage.getItem("work")) || [];

function calc(i,o){
 let s=new Date("2000 "+i);
 let e=new Date("2000 "+o);
 let h=(e-s)/3600000;
 return {hrs:h, ot:h>9?(h-9):0};
}

function render(){
 let html = "";
 let totalOT = 0, totalH = 0;

 if(list.length===0){
  document.getElementById("empty").innerText="ยังไม่มีข้อมูล 😅";
 } else {
  document.getElementById("empty").innerText="";
 }

 let sorted = [...list].sort((a,b)=> new Date(b.date) - new Date(a.date));

 let currentMonth = "";

 sorted.forEach(d=>{
  let dateObj = new Date(d.date);

  let monthName = dateObj.toLocaleDateString("th-TH", {
    year: "numeric",
    month: "long"
  });

  if(monthName !== currentMonth){
    currentMonth = monthName;
    html += `
    <tr>
      <td colspan="3" class="month">📅 ${monthName}</td>
    </tr>`;
  }

  let c = calc(d.in,d.out);
  totalOT += c.ot;
  totalH += c.hrs;

  html += `
  <tr>
    <td>${d.date}</td>
    <td><span class="badge ${c.ot>0?'ot':'normal'}">${c.ot.toFixed(2)}</span></td>
    <td>${d.note || "-"}</td>
  </tr>`;
 });

 document.getElementById("data").innerHTML = html;
 document.getElementById("ot").innerText = totalOT.toFixed(2);
 document.getElementById("hrs").innerText = totalH.toFixed(2);
 document.getElementById("days").innerText = list.length;

 localStorage.setItem("work", JSON.stringify(list));
}

function save(){
 let d=date.value;
 let i=in.value;
 let o=out.value;
 let n=note.value;

 if(!d||!i||!o){ alert("กรอกให้ครบ"); return; }

 list.push({date:d,in:i,out:o,note:n});

 date.value="";
 in.value="";
 out.value="";
 note.value="";

 render();
}

function exportExcel(){
 let csv="Date,OT,Note\n";
 list.forEach(d=>{
  let c=calc(d.in,d.out);
  csv+=`${d.date},${c.ot.toFixed(2)},${d.note}\n`;
 });

 let blob=new Blob([csv]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="worktime.csv";
 a.click();
}

render();
</script>

</body>
</html>
